<script>
(function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');
    const orbs = [
        { x:0.15, y:0.20, r:0.60, vx: 0.000024, vy: 0.000016, color:[20,90,40]  },
        { x:0.78, y:0.60, r:0.55, vx:-0.000018, vy:-0.000013, color:[15,70,30]  },
        { x:0.50, y:0.88, r:0.45, vx: 0.000014, vy:-0.000019, color:[25,110,50] },
        { x:0.72, y:0.10, r:0.38, vx:-0.000020, vy: 0.000022, color:[10,60,25]  },
    ];
    const PCOUNT = 70;
    let particles = [];
    function mkParticle() {
        return {
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            size: Math.random() * 1.4 + 0.3, alpha: Math.random() * 0.22 + 0.04,
            vx: (Math.random() - 0.5) * 0.1, vy: -(Math.random() * 0.07 + 0.025),
        };
    }
    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = Array.from({length:PCOUNT}, mkParticle);
    }
    window.addEventListener('resize', resize);
    resize();
    function draw() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = '#06100a';
        ctx.fillRect(0,0,W,H);
        orbs.forEach(o => {
            o.x += o.vx; o.y += o.vy;
            if (o.x < -0.1) o.vx =  Math.abs(o.vx);
            if (o.x >  1.1) o.vx = -Math.abs(o.vx);
            if (o.y < -0.1) o.vy =  Math.abs(o.vy);
            if (o.y >  1.1) o.vy = -Math.abs(o.vy);
            const cx = o.x*W, cy = o.y*H, r = o.r*Math.max(W,H);
            const g  = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
            const [rr,gg,bb] = o.color;
            g.addColorStop(0,   `rgba(${rr},${gg},${bb},0.28)`);
            g.addColorStop(0.5, `rgba(${rr},${gg},${bb},0.08)`);
            g.addColorStop(1,   `rgba(${rr},${gg},${bb},0)`);
            ctx.fillStyle = g;
            ctx.fillRect(0,0,W,H);
        });
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.y < -4) { p.x = Math.random()*W; p.y = H+4; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = `rgba(140,220,160,${p.alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

(function() {
    const nav  = document.getElementById('mainNav');
    const pill = nav.querySelector('.nav-pill');
    let isScrolled = false;
    let cachedDx   = null;
    function calcDx() {
        pill.style.transition = 'none';
        pill.style.transform  = 'translateX(0)';
        const navRect  = nav.getBoundingClientRect();
        const pillRect = pill.getBoundingClientRect();
        return (navRect.width / 2) - (pillRect.left - navRect.left + pillRect.width / 2);
    }
    function update(animate) {
        if (isScrolled) {
            if (cachedDx === null) cachedDx = calcDx();
            requestAnimationFrame(() => {
                pill.style.transition = animate ? 'transform 0.55s cubic-bezier(.4,0,.2,1), box-shadow 0.45s' : 'none';
                pill.style.transform = `translateX(${cachedDx}px)`;
                nav.classList.add('scrolled');
            });
        } else {
            cachedDx = null;
            pill.style.transition = animate ? 'transform 0.55s cubic-bezier(.4,0,.2,1), box-shadow 0.45s' : 'none';
            pill.style.transform = 'translateX(0)';
            nav.classList.remove('scrolled');
        }
    }
    window.addEventListener('scroll', () => {
        const wasScrolled = isScrolled;
        isScrolled = window.scrollY > 80;
        if (isScrolled !== wasScrolled) update(true);
    }, { passive: true });
    window.addEventListener('resize', () => { cachedDx = null; update(false); });
    update(false);
})();

function init3DCards() {}

(function initClients() {
    const stage = document.getElementById('clientsStage');
    const svg   = document.getElementById('clientsWebSvg');
    const W = () => stage.offsetWidth;
    const H = () => stage.offsetHeight;
    const positions = [
        {x:0.18,y:0.07},{x:0.47,y:0.04},{x:0.76,y:0.09},
        {x:0.27,y:0.40},{x:0.55,y:0.36},{x:0.83,y:0.42},
        {x:0.16,y:0.73},{x:0.45,y:0.70},{x:0.74,y:0.75},
    ];
    const edges = [
        [0,1],[1,2],[0,3],[1,3],[1,4],[2,4],[2,5],
        [3,4],[4,5],[3,6],[4,6],[4,7],[5,7],[5,8],[6,7],[7,8],
    ];
    let nodes = [];
    let mouseNorm = {x:0,y:0};
    let scrollY   = 0;
    clientsData.forEach((c,i) => {
        const p  = positions[i];
        const el = document.createElement('a');
        el.className='client-node';
        el.href=c.url; el.target='_blank'; el.rel='noopener noreferrer';
        const wrap = document.createElement('div');
        wrap.className='client-logo-wrap';
        const glow = document.createElement('div');
        glow.className='client-glow';
        const img = document.createElement('img');
        img.className='client-logo-img';
        img.src=c.img; img.alt=c.name;
        wrap.appendChild(glow); wrap.appendChild(img);
        const nameEl = document.createElement('div');
        nameEl.className='client-name';
        nameEl.textContent=c.name;
        el.appendChild(wrap); el.appendChild(nameEl);
        stage.appendChild(el);
        nodes.push({el, baseX:p.x, baseY:p.y, ox:0, oy:0, depth:0.4+Math.random()*0.5});
    });
    const lines = edges.map(([a,b])=>{
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('stroke','rgba(110,200,130,0.06)');
        line.setAttribute('stroke-width','1');
        svg.appendChild(line);
        return {line,a,b};
    });
    function getPos(n) { return { x:n.baseX*W()+n.ox, y:n.baseY*H()+n.oy }; }
    const MOUSE_STRENGTH=10, RESTORE=0.03;
    function tick() {
        nodes.forEach(n=>{
            const tx = mouseNorm.x*MOUSE_STRENGTH*n.depth;
            const ty = mouseNorm.y*MOUSE_STRENGTH*n.depth - scrollY*n.depth*0.025;
            n.ox+=(tx-n.ox)*RESTORE;
            n.oy+=(ty-n.oy)*RESTORE;
            const pos=getPos(n);
            n.el.style.transform=`translate(${pos.x-100}px,${pos.y-100}px)`;
        });
        lines.forEach(({line,a,b})=>{
            const pa=getPos(nodes[a]), pb=getPos(nodes[b]);
            line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y);
            line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y);
        });
        requestAnimationFrame(tick);
    }
    document.addEventListener('mousemove', e=>{
        mouseNorm.x=(e.clientX/window.innerWidth -0.5);
        mouseNorm.y=(e.clientY/window.innerHeight-0.5);
    });
    window.addEventListener('scroll',()=>{ scrollY=window.scrollY; });
    tick();
})();

function setupShowreelVideo() {
    const vid=document.getElementById('showreelVideo');
    const lbl=document.querySelector('.video-loading');
    vid.addEventListener('loadeddata',()=>lbl.style.display='none');
    vid.addEventListener('error',()=>{ lbl.textContent=''; });
    vid.play().catch(()=>{
        lbl.textContent='';
        lbl.style.cursor='pointer';
        lbl.addEventListener('click',()=>vid.play().then(()=>lbl.style.display='none'));
    });
}

function createVideoGrid(category,gridId,count,specialLayout=false) {
    const grid=document.getElementById(gridId);
    if(!grid) return;
    grid.innerHTML='';
    videoData[category].slice(0,count).forEach((video,index)=>{
        if(specialLayout && index===count-1){
            const w=document.createElement('div');
            w.className='single-item';
            w.appendChild(createVideoItem(video));
            grid.appendChild(w);
        } else {
            grid.appendChild(createVideoItem(video));
        }
    });
}

function createVideoItem(video) {
    const item = document.createElement('div');
    item.className = 'video-item';
    item.innerHTML = `
        <div class="video-thumb-wrap">
            <img class="video-thumb-img" src="${video.preview}" alt="${video.title}" loading="lazy">
        </div>
        <div class="video-info-overlay">
            <div class="play-icon">▶</div>
            <div class="video-title">${video.title}</div>
            <div class="video-year">${video.year}</div>
        </div>`;
    item.addEventListener('click', () => openVideoModal(video.src));
    return item;
}

function setupNavigation() {
    document.querySelectorAll('.nav-links a').forEach(link=>{
        link.addEventListener('click',e=>{
            e.preventDefault();
            const target=link.getAttribute('href').substring(1);
            setActiveNav(target);
            stopAllVideos();
            showPage(target);
            window.scrollTo({top:0,behavior:'smooth'});
        });
    });
    document.querySelectorAll('.service-card[data-page]').forEach(card=>{
        card.addEventListener('click',e=>{
            e.preventDefault();
            const target=card.getAttribute('data-page');
            setActiveNav(target);
            stopAllVideos();
            showPage(target);
            window.scrollTo({top:0,behavior:'smooth'});
        });
    });
}

function setActiveNav(id) {
    document.querySelectorAll('.nav-links a').forEach(a=>{
        a.classList.toggle('active', a.getAttribute('href')==='#'+id);
    });
}

function showPage(id) {
    ['showreel','motion','cgi','longform'].forEach(p=>
        document.getElementById(p+'-page')?.classList.remove('active')
    );
    document.getElementById(id+'-page')?.classList.add('active');
    const sv = document.getElementById('showreelVideo');
    if (id === 'showreel') {
        sv?.play().catch(()=>{});
    } else {
        sv?.pause();
    }
}

function stopAllVideos() {
    const mv = document.getElementById('modalVideo');
    if (mv) { mv.pause(); mv.removeAttribute('src'); }
}

function setupModal() {
    const modal = document.getElementById('videoModal');
    const mv    = document.getElementById('modalVideo');
    const close = () => {
        modal.classList.remove('active');
        mv.pause(); mv.removeAttribute('src');
        if (document.getElementById('showreel-page')?.classList.contains('active'))
            document.getElementById('showreelVideo').play().catch(() => {});
    };
    document.getElementById('closeModal').addEventListener('click', close);
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
}

function openVideoModal(src) {
    const modal = document.getElementById('videoModal');
    const mv    = document.getElementById('modalVideo');
    stopAllVideos();
    mv.src = src;
    modal.classList.add('active');
    mv.play().catch(() => {});
}

window.addEventListener('hashchange',()=>{
    const hash=window.location.hash.substring(1)||'showreel';
    setActiveNav(hash); showPage(hash);
});

const initH=window.location.hash.substring(1)||'showreel';
setActiveNav(initH); showPage(initH);

document.addEventListener('DOMContentLoaded', function() {
    const modal    = document.getElementById('showreelModal');
    const modalVid = document.getElementById('showreelModalVideo');
    const openBtn  = document.getElementById('openShowreel');
    const closeBtn = document.getElementById('closeShowreelModal');
    if (!modal || !openBtn) return;
    function openModal() {
        modal.classList.add('active');
        modalVid.currentTime = 0;
        modalVid.play().catch(() => {});
    }
    function closeModal() {
        modal.classList.remove('active');
        modalVid.pause();
        modalVid.currentTime = 0;
    }
    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });
});
